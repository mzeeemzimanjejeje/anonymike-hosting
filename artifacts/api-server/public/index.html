  <!-- Resource Metrics Widget -->
  <style>
    .amt-res-row {
      display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap;
    }
    .amt-res-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 3px 8px; font-family: 'Inter', sans-serif;
      font-size: 11px; color: #888; transition: color 0.3s, border-color 0.3s;
      white-space: nowrap;
    }
    .amt-res-pill.has-data { color: #ccc; border-color: rgba(0,229,153,0.15); }
    .amt-res-pill svg { flex-shrink: 0; }
    .amt-res-label { color: #555; font-size: 10px; margin-right: 1px; }
    .amt-res-spin { display: inline-block; width: 8px; height: 8px; border: 1.5px solid #333; border-top-color: #00e599; border-radius: 50%; animation: amt-spin 0.7s linear infinite; }
    @keyframes amt-spin { to { transform: rotate(360deg); } }

  <script>
  (function () {
    // ── Resource Metrics ──────────────────────────────────────
    // Formats bytes to MB / GB
    function fmtBytes(b) {
      if (b == null) return '—';
      const mb = b / 1048576;
      return mb < 1024 ? mb.toFixed(0) + ' MB' : (mb / 1024).toFixed(1) + ' GB';
    }
    function fmtCpu(p) {
      if (p == null) return '—';
      return p.toFixed(1) + '%';
    }
    function fmtUptime(ms) {
      if (ms == null) return null;
      const totalMin = Math.floor(ms / 60000);
      if (totalMin < 1) return '< 1m';
      const d = Math.floor(totalMin / 1440);
      const h = Math.floor((totalMin % 1440) / 60);
      const m = totalMin % 60;
      let s = '';
      if (d > 0) s += d + 'd ';
      if (h > 0) s += h + 'h ';
      if (m > 0 || (d === 0 && h === 0)) s += m + 'm';
      return s.trim();
    }

    // Fetch helpers (credentials: include so session cookie is sent)
    async function apiFetch(path2) {
      const r = await fetch('/api' + path2, { credentials: 'include' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }

    // Cache: botId → last fetched resources
    const resCache = {};
    // Cache: botName → botId (populated from my-bots list)
    let nameToBot = {};

    async function refreshBotList() {
      try {
        const data = await apiFetch('/bots/my-bots');
        // Response shape: { bots: [...] }
        const bots = Array.isArray(data) ? data : (Array.isArray(data?.bots) ? data.bots : null);
        if (!bots) {
          console.debug('[AMT-RES] Unexpected /api/bots/my-bots shape:', typeof data, Object.keys(data || {}));
          return;
        }
        nameToBot = {};
        for (const b of bots) nameToBot[b.name] = b;
      } catch { /* not logged in or network error */ }
    }

    function makePill(label, value, loading) {
      const pill = document.createElement('span');
      pill.className = 'amt-res-pill';
      if (!loading) pill.classList.add('has-data');
      if (loading) {
        pill.innerHTML = '<span class="amt-res-spin"></span>';
      } else {
        pill.innerHTML =
          '<span class="amt-res-label">' + label + '</span>' +
          '<span>' + value + '</span>';
      }
      return pill;
    }

    function upsertWidget(card, state) {
      // state: null = loading, object = resources data (or {unavailable:true})
      let row = card.querySelector('.amt-res-row');
      const isNew = !row;
      if (isNew) {
        row = document.createElement('div');
        row.className = 'amt-res-row';
      }
      row.innerHTML = '';

      if (state === null) {
        // Loading
        row.appendChild(makePill(null, null, true));
        row.appendChild(makePill(null, null, true));
        row.appendChild(makePill(null, null, true));
      } else if (state.unavailable) {
        const pill = document.createElement('span');
        pill.className = 'amt-res-pill';
        pill.textContent = 'Metrics unavailable';
        pill.style.fontStyle = 'italic';
        row.appendChild(pill);
      } else {
        row.appendChild(makePill('CPU', fmtCpu(state.cpuAbsolute)));
        row.appendChild(makePill('RAM', fmtBytes(state.memoryBytes)));
        row.appendChild(makePill('DISK', fmtBytes(state.diskBytes)));
        const uptime = fmtUptime(state.uptimeMilliseconds);
        if (uptime != null) row.appendChild(makePill('UP', uptime));
      }

      if (isNew) {
        // Insert after the status row (h4's sibling), inside the .min-w-0 container
        const h4 = card.querySelector('h4');
        if (!h4) return;
        const container = h4.parentElement; // .min-w-0 div
        const statusRow = h4.nextElementSibling; // div.flex.items-center.gap-2.mt-1
        if (statusRow) statusRow.insertAdjacentElement('afterend', row);
        else container.appendChild(row);
      }
    }

    async function fetchAndInject(card, bot) {
      // Show loading spinners the first time
      if (!card.querySelector('.amt-res-row')) upsertWidget(card, null);

      try {
        const data = await apiFetch('/bots/' + bot.id + '/resources');
        if (!data.available || !data.resources) {
          upsertWidget(card, { unavailable: true });
        } else {
          resCache[bot.id] = data.resources;
          upsertWidget(card, data.resources);
        }
      } catch {
        upsertWidget(card, { unavailable: true });
      }
    }

    async function tick() {
      await refreshBotList();
      if (!Object.keys(nameToBot).length) return;

      // Find all bot name headings in glass-panel cards
      const h4s = document.querySelectorAll('h4');
      for (const h4 of h4s) {
        const name = h4.textContent.trim();
        const bot = nameToBot[name];
        if (!bot) continue;

        const card = h4.closest('.glass-panel');
        if (!card) continue;

        // Only show metrics for running bots with a panel server
        if (bot.status !== 'running' || !bot.pterodactylServerId) {
          // Remove stale widget if bot is no longer running
          const stale = card.querySelector('.amt-res-row');
          if (stale) stale.remove();
          continue;
        }

        fetchAndInject(card, bot);
      }
    }

    // Initial delay to let React finish first render, then poll every 12 s
    setTimeout(tick, 2500);
    setInterval(tick, 12000);
  })();
  </script>

  <script>
  (function () {
    // ── Constants ──────────────────────────────────────────────
    const KES_PER_COIN = 0.5; // 1 coin = KES 0.50 (Starter rate: 100 coins / KES 50)
    const COINS_PER_KES = 2;  // 1 KES = 2 coins

    // ── State ──────────────────────────────────────────────────
    let myCoins = null;
    let dMode = 'coins'; // direct send currency mode
    let lMode = 'coins'; // link currency mode
    let generatedLink = null;

    // ── Elements ───────────────────────────────────────────────
    const fab    = document.getElementById('amt-fab');
    const overlay= document.getElementById('amt-overlay');
    const balEl  = document.getElementById('amt-bal');
    const closeBtn = document.getElementById('amt-close');
    const toast  = document.getElementById('amt-toast');

    // ── Toast ──────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, isErr) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = isErr ? 'err-toast show' : 'show';
      toastTimer = setTimeout(() => toast.className = '', 3500);
    }

    // ── API ────────────────────────────────────────────────────
    async function api(method, path, body) {
      const r = await fetch('/api' + path, {
        method, credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined
      });
      return { ok: r.ok, data: await r.json() };
    }

    async function fetchMe() {
      try {
        const { ok, data } = await api('GET', '/users/me');
        return ok ? data : null;
      } catch { return null; }
    }

    // ── Currency helpers ───────────────────────────────────────
    window.amtSetCurrency = function(panel, mode) {
      if (panel === 'direct') {
        dMode = mode;
        document.getElementById('amt-d-coins-btn').className = mode === 'coins' ? 'active' : '';
        document.getElementById('amt-d-kes-btn').className   = mode === 'kes'   ? 'active' : '';
        updateHint('direct');
      } else {
        lMode = mode;
        document.getElementById('amt-l-coins-btn').className = mode === 'coins' ? 'active' : '';
        document.getElementById('amt-l-kes-btn').className   = mode === 'kes'   ? 'active' : '';
        updateHint('link');
      }
    };

    function updateHint(panel) {
      const isLink  = panel === 'link';
      const mode    = isLink ? lMode : dMode;
      const input   = document.getElementById(isLink ? 'amt-l-amount' : 'amt-d-amount');
      const hint    = document.getElementById(isLink ? 'amt-l-hint'   : 'amt-d-hint');
      const val     = parseFloat(input.value);
      if (!val || isNaN(val) || val <= 0) { hint.textContent = mode === 'kes' ? `1 KES = ${COINS_PER_KES} coins` : `1 coin = KES ${KES_PER_COIN}`; return; }
      if (mode === 'kes') {
        const coins = Math.floor(val * COINS_PER_KES);
        hint.textContent = `≈ ${coins.toLocaleString()} coins`;
      } else {
        hint.textContent = `≈ KES ${(val * KES_PER_COIN).toLocaleString()}`;
      }
    }

    function coinsFromInput(panel) {
      const isLink = panel === 'link';
      const mode   = isLink ? lMode : dMode;
      const val    = parseFloat(document.getElementById(isLink ? 'amt-l-amount' : 'amt-d-amount').value);
      if (!val || isNaN(val) || val < 1) return null;
      return mode === 'kes' ? Math.floor(val * COINS_PER_KES) : Math.floor(val);
    }

    // ── Tabs ───────────────────────────────────────────────────
    document.querySelectorAll('.amt-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.amt-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.amt-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('amt-panel-' + tab.dataset.tab).classList.add('active');
        clearMsgs();
      });
    });

    // ── Amount hint on input ───────────────────────────────────
    document.getElementById('amt-d-amount').addEventListener('input', () => updateHint('direct'));
    document.getElementById('amt-l-amount').addEventListener('input', () => updateHint('link'));

    // ── Open / Close ───────────────────────────────────────────
    fab.addEventListener('click', async () => {
      clearMsgs();
      document.getElementById('amt-link-result').style.display = 'none';
      generatedLink = null;
      const user = await fetchMe();
      if (user) { myCoins = user.coins; balEl.textContent = myCoins.toLocaleString(); }
      overlay.classList.add('open');
    });

    function closeModal() { overlay.classList.remove('open'); }
    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

    function clearMsgs() {
      ['amt-d-msg','amt-l-msg'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = ''; el.className = 'amt-msg';
      });
    }

    function setMsg(id, text, isErr) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'amt-msg ' + (isErr ? 'err' : 'ok');
    }

    // ── Direct send ────────────────────────────────────────────
    document.getElementById('amt-d-send').addEventListener('click', async () => {
      const btn   = document.getElementById('amt-d-send');
      const email = document.getElementById('amt-d-email').value.trim();
      const coins = coinsFromInput('direct');
      if (!email) { setMsg('amt-d-msg', 'Please enter a recipient email.', true); return; }
      if (!coins)  { setMsg('amt-d-msg', 'Please enter a valid amount.', true); return; }
      if (myCoins !== null && coins > myCoins) {
        setMsg('amt-d-msg', `Not enough coins. You have ${myCoins.toLocaleString()}.`, true); return;
      }
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const { ok, data } = await api('POST', '/users/transfer-coins', { recipientEmail: email, amount: coins });
        if (!ok) { setMsg('amt-d-msg', data.error || 'Transfer failed.', true); }
        else {
          myCoins = data.coins; balEl.textContent = myCoins.toLocaleString();
          setMsg('amt-d-msg', `✓ ${coins.toLocaleString()} coins sent to ${email}`, false);
          document.getElementById('amt-d-email').value = '';
          document.getElementById('amt-d-amount').value = '';
          document.getElementById('amt-d-hint').textContent = '';
        }
      } catch { setMsg('amt-d-msg', 'Network error. Please try again.', true); }
      finally { btn.disabled = false; btn.textContent = 'Send Coins'; }
    });

    // ── Create link ────────────────────────────────────────────
    document.getElementById('amt-l-create').addEventListener('click', async () => {
      const btn   = document.getElementById('amt-l-create');
      const coins = coinsFromInput('link');
      if (!coins) { setMsg('amt-l-msg', 'Please enter a valid amount.', true); return; }
      if (myCoins !== null && coins > myCoins) {
        setMsg('amt-l-msg', `Not enough coins. You have ${myCoins.toLocaleString()}.`, true); return;
      }
      btn.disabled = true; btn.textContent = 'Creating…';
      document.getElementById('amt-link-result').style.display = 'none';
      try {
        const { ok, data } = await api('POST', '/users/coin-link', { amount: coins });
        if (!ok) { setMsg('amt-l-msg', data.error || 'Failed to create link.', true); }
        else {
          myCoins = data.coins; balEl.textContent = myCoins.toLocaleString();
          const link = `${location.origin}/claim/${data.token}`;
          generatedLink = link;
          document.getElementById('amt-link-url').textContent = link;
          const exp = new Date(data.expiresAt);
          document.getElementById('amt-link-meta').textContent =
            `${coins.toLocaleString()} coins locked · expires ${exp.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} tomorrow`;
          document.getElementById('amt-link-result').style.display = 'block';
          setMsg('amt-l-msg', '', false);
          document.getElementById('amt-l-amount').value = '';
          document.getElementById('amt-l-hint').textContent = '';
        }
      } catch { setMsg('amt-l-msg', 'Network error. Please try again.', true); }
      finally { btn.disabled = false; btn.textContent = 'Create Link'; }
    });

    // ── Copy & native share ────────────────────────────────────
    window.amtCopyLink = function() {
      if (!generatedLink) return;
      navigator.clipboard.writeText(generatedLink).then(() => showToast('Link copied!', false)).catch(() => showToast('Copy failed — select the link manually.', true));
    };
    window.amtNativeShare = function() {
      if (!generatedLink) return;
      if (navigator.share) {
        navigator.share({ title: 'Claim your free coins!', text: '🪙 Someone sent you coins on ANONYMIKETECH — claim them here:', url: generatedLink }).catch(() => {});
      } else {
        amtCopyLink();
      }
    };

    // ── Init ───────────────────────────────────────────────────
    async function init() {
      const user = await fetchMe();
      if (!user) { setTimeout(init, 3000); return; }
      myCoins = user.coins;
      balEl.textContent = myCoins.toLocaleString();
      fab.style.display = 'flex';

      // Handle claim result redirected from server
      const params = new URLSearchParams(location.search);
      if (params.has('claimed')) {
        const n = parseInt(params.get('claimed'), 10);
        showToast(`🎉 You claimed ${n.toLocaleString()} coins!`, false);
        history.replaceState({}, '', location.pathname);
      } else if (params.has('claimError')) {
        showToast(params.get('claimError'), true);
        history.replaceState({}, '', location.pathname);
      }
    }

    // Handle ?pendingClaim= (user not logged in when they opened the link)
    (function checkPendingClaim() {
      const params = new URLSearchParams(location.search);
      if (params.has('pendingClaim')) {
        const token = params.get('pendingClaim');
        // Store token so after login the page can auto-redirect
        sessionStorage.setItem('pendingClaimToken', token);
        document.getElementById('amt-claim-title').textContent = 'Coins waiting for you!';
        document.getElementById('amt-claim-desc').textContent = 'Login or sign up to claim the coins sent to you.';
        document.getElementById('amt-claim-overlay').classList.add('open');
        history.replaceState({}, '', location.pathname);
      }
      // After login, check if there's a stored pending claim
      const stored = sessionStorage.getItem('pendingClaimToken');
      if (stored) {
        // Wait for app to load, then try to claim via API
        setTimeout(async () => {
          const user = await fetchMe();
          if (user) {
            sessionStorage.removeItem('pendingClaimToken');
            const { ok, data } = await api('POST', `/users/coin-claim/${stored}`, {});
            if (ok) showToast(`🎉 You claimed ${data.amount?.toLocaleString()} coins!`, false);
            else if (data.error) showToast(data.error, true);
          }
        }, 2000);
      }
    })();

    init();
  })();
  </script>
  </body>
</html>
